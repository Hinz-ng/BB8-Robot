[env:esp32s3_super_mini]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Flash config (Super Mini — no PSRAM) ─────────────────────────────────────
; board_build.arduino.memory_type is intentionally omitted.
; qio_opi would initialise the OPI PSRAM bus, find nothing on Super Mini,
; and crash before setup() runs. Leave this line absent for no-PSRAM builds.
board_build.flash_mode  = qio
board_build.flash_size  = 4MB
board_upload.flash_size = 4MB

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; -DBOARD_HAS_PSRAM is intentionally omitted — Super Mini has no PSRAM.
    ; Adding it with no PSRAM hardware causes a boot crash.
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB CDC — required for Super Mini serial

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    ; mathieucarbou fork of ESPAsyncWebServer requires mathieucarbou/AsyncTCP.
    ; me-no-dev/AsyncTCP causes WebSocket instability with this server version.
    mathieucarbou/ESPAsyncWebServer @ ^3.0.0
    mathieucarbou/AsyncTCP @ ^3.0.0