[env:esp32s3_super_mini]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Override for Super Mini flash/PSRAM config
board_build.flash_mode        = qio
board_build.flash_size        = 4MB
board_upload.flash_size       = 4MB
board_build.arduino.memory_type = qio_opi   ; remove if no PSRAM on your variant

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM           ; remove if your Super Mini lacks PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1 ; enables USB serial without external adapter

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    ; No external IMU library — we write a register-direct SPI driver
    ; (LSM6DSV16XTR has no mature Arduino lib; roll your own for control quality)
    bblanchon/ArduinoJson @ ^7.0.0
    me-no-dev/ESPAsyncWebServer @ ^1.2.4
    me-no-dev/AsyncTCP @ ^1.1.1
    