[env:esp32s3_super_mini]
platform  = espressif32
board = esp32s3box
framework = arduino

; ── Flash + memory config (Super Mini — no OPI PSRAM) ────────────────────────
; memory_type = qio_qspi selects the no-OPI-PSRAM pre-compiled bootloader.
; Without this, esp32-s3-devkitc-1's default bootloader initialises the OPI
; PSRAM bus, finds nothing on Super Mini, and crashes before setup() runs.
; This is independent of -DBOARD_HAS_PSRAM — that flag only affects app code,
; not the pre-compiled bootloader binary selection.
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode          = dio
board_build.flash_freq          = 40m
board_build.flash_size          = 4MB
board_upload.flash_size         = 4MB

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; -DBOARD_HAS_PSRAM intentionally omitted — Super Mini has no PSRAM.
    -DARDUINO_USB_CDC_ON_BOOT=1   ; native USB CDC — required for Super Mini serial

monitor_speed = 115200
upload_speed  = 460800

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    mathieucarbou/ESPAsyncWebServer @ ^3.0.0
    mathieucarbou/AsyncTCP @ ^3.0.0